# .github/workflows/demo-poc.yml

name: GARVIS PoC CI - Backend & Frontend Tests

on:
  pull_request:
    branches: [ main, master ] # Adjust branches as needed
  push:
    branches: [ main, master ] # Also run on push to main branches

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout backend repo (garvis42)
        uses: actions/checkout@v4
        with:
          repository: jonpearlandpig/garvis42
          path: garvis42
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: garvis42/backend/requirements.txt

      - name: Install backend dependencies
        working-directory: garvis42/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: garvis42/backend
        run: |
          pytest -v tests/

  frontend-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout main repo (garvis-command-center)
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test
